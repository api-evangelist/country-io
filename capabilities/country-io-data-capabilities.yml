name: Country.io Data Capabilities
description: >-
  Workflow capabilities exposed by the Country.io static JSON data files for
  enriching applications, forms, and analytics with country reference data.
url: https://country.io/data/
version: '1.0'
modified: '2026-04-28'
api: Country.io Data API
baseURL: https://country.io
capabilities:
  - name: Country Name Lookup
    description: Resolve an ISO2 code to a human-readable country name.
    operations:
      - getCountryNames
    inputs:
      - ISO2 country code
    outputs:
      - country name
  - name: Capital City Lookup
    description: Resolve an ISO2 code to a capital city name.
    operations:
      - getCapitals
    inputs:
      - ISO2 country code
    outputs:
      - capital city
  - name: Continent Mapping
    description: Map an ISO2 country code to its two-letter continent code.
    operations:
      - getContinents
    inputs:
      - ISO2 country code
    outputs:
      - continent code
  - name: ISO Code Conversion
    description: Convert ISO 3166-1 alpha-2 codes to alpha-3 codes.
    operations:
      - getIso3
    inputs:
      - ISO2 country code
    outputs:
      - ISO3 country code
  - name: Phone Prefix Lookup
    description: Resolve a country to its international telephone dialing prefix.
    operations:
      - getPhoneCodes
    inputs:
      - ISO2 country code
    outputs:
      - dialing prefix
  - name: Currency Lookup
    description: Resolve a country to its ISO 4217 currency code.
    operations:
      - getCurrencyCodes
    inputs:
      - ISO2 country code
    outputs:
      - currency code
useCases:
  - name: Country Picker Enrichment
    description: Populate dropdowns and pickers with country names, ISO codes, and continents.
    capabilities:
      - Country Name Lookup
      - ISO Code Conversion
      - Continent Mapping
  - name: Phone Field Defaults
    description: Pre-populate international dialing prefixes based on country selection.
    capabilities:
      - Phone Prefix Lookup
  - name: Localised Pricing
    description: Choose default currency formatting and presentation by country.
    capabilities:
      - Currency Lookup
      - Country Name Lookup
