aid: country-io
name: Country.io
kind: company
description: >-
  Country.io is a small open data project that publishes a set of static JSON files mapping ISO 3166-1 alpha-2 country
  codes to common reference data: country names, capital cities, ISO 3166-1 alpha-3 codes, continent codes,
  international telephone dialing prefixes, and ISO 4217 currency codes. The files are commonly consumed as a
  lightweight country-data dataset for forms, country pickers, and analytics enrichment.
