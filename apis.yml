apis:
  - aid: country-io:country-io-data-api
    name: Country.io Data API
    description: >-
      Country.io exposes six static JSON files under https://country.io. Each file is a flat object keyed by ISO 3166-1
      alpha-2 country code and maps to a single reference value: country name, capital city, continent code, ISO3 code,
      dialing prefix, or currency code. The endpoints are open and unauthenticated.
